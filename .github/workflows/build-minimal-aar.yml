name: Build Minimal FFmpeg Android AAR

on:
  workflow_dispatch:

jobs:
  build:
    name: Build minimal FFmpeg .so files and repackage AAR
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FFMPEG_VERSION: "n8.0.1"
      NDK_VERSION: "27.2.12479018"
      API_LEVEL: "24"
      ABIS: "arm64-v8a armeabi-v7a x86_64"
      # The original full-gpl AAR — we keep its classes.jar and libffmpegkit*.so
      ORIG_AAR_URL: "https://repo1.maven.org/maven2/com/antonkarpenko/ffmpeg-kit-full-gpl/2.1.0/ffmpeg-kit-full-gpl-2.1.0.aar"

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential nasm yasm pkg-config \
            curl git unzip zip cmake

      - name: Setup Android NDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --install "ndk;$NDK_VERSION" || true
          echo "NDK_HOME=${ANDROID_HOME}/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Download original AAR
        run: |
          curl -L -o /tmp/original.aar "$ORIG_AAR_URL"
          echo "Original AAR size: $(du -h /tmp/original.aar | cut -f1)"

      - name: Clone sources
        run: |
          git clone --depth 1 -b $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git /tmp/ffmpeg-src
          git clone --depth 1 https://code.videolan.org/videolan/x264.git /tmp/x264-src
          git clone --depth 1 -b v1.15.0 https://chromium.googlesource.com/webm/libvpx.git /tmp/vpx-src
          curl -L -o /tmp/freetype.tar.xz "https://download.savannah.gnu.org/releases/freetype/freetype-2.13.3.tar.xz"
          curl -L -o /tmp/harfbuzz.tar.xz "https://github.com/harfbuzz/harfbuzz/releases/download/14.1.0/harfbuzz-14.1.0.tar.xz"
          cd /tmp && tar xf freetype.tar.xz && tar xf harfbuzz.tar.xz

      - name: Build dependencies for each ABI
        run: |
          for ABI in $ABIS; do
            echo "=========================================="
            echo "=== Building deps for $ABI"
            echo "=========================================="

            case $ABI in
              arm64-v8a)   ARCH=aarch64; TRIPLE=aarch64-linux-android ;;
              armeabi-v7a) ARCH=arm;     TRIPLE=armv7a-linux-androideabi ;;
              x86_64)      ARCH=x86_64;  TRIPLE=x86_64-linux-android ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            CXX="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang++"
            AR="${TOOLCHAIN}/bin/llvm-ar"
            RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
            PREFIX="/tmp/deps-${ABI}"

            # --- freetype (static) ---
            cd /tmp/freetype-2.13.3
            make distclean 2>/dev/null || true
            ./configure \
              --host=$TRIPLE --prefix=$PREFIX \
              --enable-static --disable-shared \
              --with-zlib=no --with-bzip2=no --with-png=no --with-harfbuzz=no --with-brotli=no \
              CC="$CC" AR="$AR" RANLIB="$RANLIB"
            make -j$(nproc) && make install

            # --- harfbuzz (static, minimal) ---
            cd /tmp/harfbuzz-14.1.0
            rm -rf build-${ABI}
            cmake -B build-${ABI} \
              -DCMAKE_TOOLCHAIN_FILE="${NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI=$ABI -DANDROID_PLATFORM=android-${API_LEVEL} \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_PREFIX_PATH=$PREFIX \
              -DCMAKE_FIND_ROOT_PATH=$PREFIX \
              -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
              -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
              -DFREETYPE_LIBRARY=$PREFIX/lib/libfreetype.a \
              -DFREETYPE_INCLUDE_DIRS=$PREFIX/include/freetype2 \
              -DBUILD_SHARED_LIBS=OFF \
              -DHB_HAVE_FREETYPE=ON -DHB_HAVE_GLIB=OFF -DHB_HAVE_GOBJECT=OFF \
              -DHB_HAVE_ICU=OFF -DHB_HAVE_CAIRO=OFF -DHB_BUILD_SUBSET=OFF
            cmake --build build-${ABI} -j$(nproc) && cmake --install build-${ABI}

            # --- x264 (static) ---
            cd /tmp/x264-src
            make distclean 2>/dev/null || true
            CC="$CC" \
            ./configure \
              --host=$TRIPLE \
              --cross-prefix="${TOOLCHAIN}/bin/llvm-" \
              --sysroot="${TOOLCHAIN}/sysroot" \
              --prefix=$PREFIX \
              --enable-static --disable-shared --disable-cli --enable-pic
            make -j$(nproc) && make install

            # --- libvpx (static) ---
            # libvpx needs the generic target and explicit CC/LD for Android NDK
            case $ABI in
              arm64-v8a)   VPX_TARGET=generic-gnu ;;
              armeabi-v7a) VPX_TARGET=generic-gnu ;;
              x86_64)      VPX_TARGET=generic-gnu ;;
            esac
            cd /tmp/vpx-src
            make distclean 2>/dev/null || true
            CC="${CC}" CXX="${CXX}" LD="${CC}" \
            AS="${CC}" STRIP="${STRIP}" AR="${AR}" \
            ./configure \
              --target=$VPX_TARGET --prefix=$PREFIX \
              --enable-static --disable-shared \
              --disable-examples --disable-tools --disable-docs --disable-unit-tests \
              --enable-vp9-encoder --enable-vp9-decoder \
              --enable-vp8-encoder --enable-vp8-decoder --enable-pic \
              --disable-runtime-cpu-detect
            make -j$(nproc) && make install

            echo "=== $ABI deps complete: $(ls $PREFIX/lib/*.a 2>/dev/null | wc -l) static libs ==="
          done

      - name: Build FFmpeg for each ABI
        run: |
          for ABI in $ABIS; do
            echo "=========================================="
            echo "=== Building FFmpeg for $ABI"
            echo "=========================================="

            case $ABI in
              arm64-v8a)
                ARCH=aarch64; TRIPLE=aarch64-linux-android
                EXTRA_CFLAGS="-march=armv8-a"; EXTRA_FFMPEG="--enable-neon" ;;
              armeabi-v7a)
                ARCH=arm; TRIPLE=armv7a-linux-androideabi
                EXTRA_CFLAGS="-march=armv7-a -mfloat-abi=softfp -mfpu=neon"; EXTRA_FFMPEG="--enable-neon" ;;
              x86_64)
                ARCH=x86_64; TRIPLE=x86_64-linux-android
                EXTRA_CFLAGS=""; EXTRA_FFMPEG="" ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            CXX="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang++"
            STRIP="${TOOLCHAIN}/bin/llvm-strip"
            PREFIX="/tmp/ffmpeg-out-${ABI}"
            DEPS="/tmp/deps-${ABI}"

            cd /tmp/ffmpeg-src
            make distclean 2>/dev/null || true

            # Verify deps exist
            echo "=== Checking deps for $ABI ==="
            ls ${DEPS}/lib/libfreetype.a ${DEPS}/lib/libharfbuzz.a ${DEPS}/lib/libx264.a ${DEPS}/lib/libvpx.a
            ls ${DEPS}/include/freetype2/freetype/freetype.h
            ls ${DEPS}/lib/pkgconfig/freetype2.pc

            # Use pkg-config wrapper that always points to our deps
            printf '#!/bin/bash\nPKG_CONFIG_PATH="%s/lib/pkgconfig" PKG_CONFIG_LIBDIR="%s/lib/pkgconfig" PKG_CONFIG_SYSROOT_DIR="" exec pkg-config "$@"\n' "$DEPS" "$DEPS" > /tmp/pkg-config-wrapper-${ABI}.sh
            chmod +x /tmp/pkg-config-wrapper-${ABI}.sh

            ./configure \
              --prefix=$PREFIX \
              --cross-prefix="${TOOLCHAIN}/bin/llvm-" \
              --sysroot="${TOOLCHAIN}/sysroot" \
              --target-os=android --arch=$ARCH \
              --cc="$CC" --cxx="$CXX" --strip="$STRIP" \
              --pkg-config=/tmp/pkg-config-wrapper-${ABI}.sh \
              --enable-cross-compile --enable-pic \
              --enable-shared --disable-static \
              --enable-gpl --enable-small --enable-lto \
              --enable-jni --enable-pthreads \
              --enable-swscale --enable-avformat --enable-avcodec --enable-avfilter --enable-avdevice \
              --disable-everything --disable-doc --disable-programs --disable-autodetect \
              --enable-encoder=libx264 \
              --enable-encoder=libvpx_vp9 \
              --enable-decoder=png \
              --enable-decoder=wrapped_avframe \
              --enable-muxer=mp4 \
              --enable-muxer=webm \
              --enable-muxer=matroska \
              --enable-demuxer=concat \
              --enable-demuxer=image2 \
              --enable-filter=split \
              --enable-filter=format \
              --enable-filter=scale \
              --enable-filter=crop \
              --enable-filter=gblur \
              --enable-filter=overlay \
              --enable-filter=colorchannelmixer \
              --enable-filter=color \
              --enable-filter=drawtext \
              --enable-libx264 \
              --enable-libvpx \
              --enable-libfreetype \
              --enable-libharfbuzz \
              --enable-protocol=file \
              --enable-indev=lavfi \
              --enable-zlib \
              $EXTRA_FFMPEG \
              --extra-cflags="-I${DEPS}/include -I${DEPS}/include/freetype2 $EXTRA_CFLAGS" \
              --extra-ldflags="-L${DEPS}/lib" \
              --pkg-config-flags=--static

            make -j$(nproc)
            make install

            # Save ABI-specific config headers generated by configure (needed for wrapper compile)
            mkdir -p /tmp/ffmpeg-config-${ABI}
            cp /tmp/ffmpeg-src/config.h /tmp/ffmpeg-config-${ABI}/
            cp /tmp/ffmpeg-src/config_components.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true
            cp /tmp/ffmpeg-src/libavutil/ffversion.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true

            echo "=== $ABI FFmpeg libs ==="
            ls -lh $PREFIX/lib/lib*.so
          done

      - name: Clone and patch FFmpegKit wrapper source
        run: |
          git clone --depth 1 https://github.com/arthenica/ffmpeg-kit.git /tmp/ffmpeg-kit-src
          mkdir -p /tmp/wrapper-src
          cp /tmp/ffmpeg-kit-src/android/ffmpeg-kit-android-lib/src/main/cpp/*.c /tmp/wrapper-src/
          cp /tmp/ffmpeg-kit-src/android/ffmpeg-kit-android-lib/src/main/cpp/*.h /tmp/wrapper-src/

          cd /tmp/wrapper-src

          # --- JNI package rename: arthenica -> antonkarpenko ---
          find . -type f | xargs sed -i 's|com/arthenica/ffmpegkit|com/antonkarpenko/ffmpegkit|g'
          find . -type f | xargs sed -i 's|Java_com_arthenica_ffmpegkit_|Java_com_antonkarpenko_ffmpegkit_|g'

          # --- FFmpeg 6->8 API migration patches ---

          # 1. Remove SAF calls (custom FFmpegKit patch, not in vanilla FFmpeg)
          sed -i '/av_set_saf_open/d; /av_set_saf_close/d' ffmpegkit.c

          # 2. Add missing #include <string.h> to ffprobekit.c
          sed -i '/#include <sys\/stat.h>/a #include <string.h>' ffprobekit.c

          # 3. AVFrame.key_frame -> AV_FRAME_FLAG_KEY (removed in FFmpeg 7)
          sed -i 's/in_picture->key_frame == 1/!!(in_picture->flags \& AV_FRAME_FLAG_KEY)/g' fftools_ffmpeg.c
          sed -i 's/next_picture->key_frame/!!(next_picture->flags \& AV_FRAME_FLAG_KEY)/g' fftools_ffmpeg.c
          sed -i 's/decoded_frame->key_frame/!!(decoded_frame->flags \& AV_FRAME_FLAG_KEY)/g' fftools_ffmpeg.c
          sed -i 's/frame->key_frame/!!(frame->flags \& AV_FRAME_FLAG_KEY)/g' fftools_ffprobe.c

          # 4. AVFrame.interlaced_frame -> AV_FRAME_FLAG_INTERLACED
          sed -i 's/frame->interlaced_frame/!!(frame->flags \& AV_FRAME_FLAG_INTERLACED)/g' fftools_ffmpeg.c fftools_ffprobe.c

          # 5. AVFrame.top_field_first reads -> AV_FRAME_FLAG_TOP_FIELD_FIRST
          #    Assignments need special handling (can't sed an = expression generically)
          #    For reads in conditionals and print statements:
          sed -i 's/frame->top_field_first ? /((frame->flags \& AV_FRAME_FLAG_TOP_FIELD_FIRST)) ? /g' fftools_ffmpeg.c
          sed -i 's/frame->top_field_first/!!(frame->flags \& AV_FRAME_FLAG_TOP_FIELD_FIRST)/g' fftools_ffprobe.c

          # 5b. AVFrame.top_field_first ASSIGNMENTS in fftools_ffmpeg.c
          #   Old: decoded_frame->top_field_first = ist->top_field_first;
          #   New: use flags
          sed -i 's/decoded_frame->top_field_first = ist->top_field_first;/if (ist->top_field_first > 0) decoded_frame->flags |= AV_FRAME_FLAG_TOP_FIELD_FIRST; else if (ist->top_field_first == 0) decoded_frame->flags \&= ~AV_FRAME_FLAG_TOP_FIELD_FIRST;/g' fftools_ffmpeg.c
          sed -i 's/frame->top_field_first = !!ost->top_field_first;/if (ost->top_field_first > 0) frame->flags |= AV_FRAME_FLAG_TOP_FIELD_FIRST; else if (ost->top_field_first == 0) frame->flags \&= ~AV_FRAME_FLAG_TOP_FIELD_FIRST;/g' fftools_ffmpeg.c

          # 6. AVCodecContext.ticks_per_frame -> hardcoded 2 (removed in FFmpeg 7)
          sed -i 's/ist->dec_ctx->ticks_per_frame/2/g' fftools_ffmpeg.c

          # 7. AVFrame.pkt_duration -> AVFrame.duration (renamed in FFmpeg 7)
          sed -i 's/frame->pkt_duration/frame->duration/g' fftools_ffprobe.c

          # 8. AVFrame.pkt_pos and pkt_size -> removed, use -1
          sed -i 's/frame->pkt_pos/-1/g' fftools_ffprobe.c
          sed -i 's/frame->pkt_size/-1/g' fftools_ffprobe.c

          echo "=== Patches applied. Verifying no remaining references ==="
          if grep -rn 'key_frame\|top_field_first\|interlaced_frame\|ticks_per_frame\|pkt_duration\|pkt_pos\b\|pkt_size\b' *.c | grep -v 'force_key_frame\|dropped_keyframe\|OPT\|OFFSET\|opt_name\|ff_dlog\|pkt_size_t\|KEY\|INTERLACED\|TOP_FIELD\|duration\b\|ist->top_field_first\|ost->top_field_first\|\.pkt_size\|muxing_queue\|parse_forced'; then
            echo "::warning::Some deprecated references may remain — review above"
          else
            echo "All deprecated references patched successfully"
          fi

      - name: Build libffmpegkit.so for each ABI
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"

          for ABI in $ABIS; do
            echo "=========================================="
            echo "=== Building libffmpegkit.so for $ABI"
            echo "=========================================="

            case $ABI in
              arm64-v8a)   TARGET=aarch64-linux-android${API_LEVEL} ;;
              armeabi-v7a) TARGET=armv7a-linux-androideabi${API_LEVEL} ;;
              x86_64)      TARGET=x86_64-linux-android${API_LEVEL} ;;
            esac

            CC="${TOOLCHAIN}/bin/${TARGET}-clang"
            STRIP="${TOOLCHAIN}/bin/llvm-strip"
            FFMPEG_PREFIX="/tmp/ffmpeg-out-${ABI}"
            WRAPPER_OUT="/tmp/wrapper-out-${ABI}"
            mkdir -p $WRAPPER_OUT

            $CC \
              -std=gnu11 -O2 -fPIC -shared -pthread \
              -ffunction-sections -fdata-sections \
              -Wno-unused-function -Wno-deprecated-declarations \
              -DANDROID -D__ANDROID_API__=$API_LEVEL -D_GNU_SOURCE -D_FILE_OFFSET_BITS=64 \
              -DFFMPEG_KIT_BUILD_DATE=$(date +%Y%m%d) \
              -I/tmp/ffmpeg-config-${ABI} \
              -I/tmp/wrapper-src \
              -I/tmp/ffmpeg-src \
              -I${FFMPEG_PREFIX}/include \
              /tmp/wrapper-src/ffmpegkit.c \
              /tmp/wrapper-src/ffmpegkit_exception.c \
              /tmp/wrapper-src/ffprobekit.c \
              /tmp/wrapper-src/fftools_cmdutils.c \
              /tmp/wrapper-src/fftools_ffmpeg.c \
              /tmp/wrapper-src/fftools_ffmpeg_demux.c \
              /tmp/wrapper-src/fftools_ffmpeg_filter.c \
              /tmp/wrapper-src/fftools_ffmpeg_hw.c \
              /tmp/wrapper-src/fftools_ffmpeg_mux.c \
              /tmp/wrapper-src/fftools_ffmpeg_mux_init.c \
              /tmp/wrapper-src/fftools_ffmpeg_opt.c \
              /tmp/wrapper-src/fftools_ffprobe.c \
              /tmp/wrapper-src/fftools_objpool.c \
              /tmp/wrapper-src/fftools_opt_common.c \
              /tmp/wrapper-src/fftools_sync_queue.c \
              /tmp/wrapper-src/fftools_thread_queue.c \
              -L${FFMPEG_PREFIX}/lib \
              -Wl,--no-undefined \
              -Wl,--gc-sections \
              -Wl,-soname,libffmpegkit.so \
              -Wl,--start-group \
              -lavfilter -lavformat -lavcodec -lavdevice -lswresample -lswscale -lavutil \
              -Wl,--end-group \
              -llog -landroid -lz -ldl -lm \
              -o $WRAPPER_OUT/libffmpegkit.so

            $STRIP --strip-unneeded $WRAPPER_OUT/libffmpegkit.so
            echo "$ABI wrapper: $(ls -lh $WRAPPER_OUT/libffmpegkit.so | awk '{print $5}')"
          done

      - name: Repackage AAR with minimal .so files
        run: |
          AAR_DIR="/tmp/aar-repack"
          mkdir -p $AAR_DIR && cd $AAR_DIR

          # Extract only Java bindings, manifest, and abidetect from original AAR.
          # libffmpegkit.so is rebuilt from patched source above.
          unzip -o /tmp/original.aar \
            classes.jar AndroidManifest.xml R.txt \
            "META-INF/*" \
            "jni/*/libffmpegkit_abidetect.so" \
            2>/dev/null || true

          # Replace FFmpeg .so files with our minimal builds
          for ABI in $ABIS; do
            mkdir -p jni/$ABI
            FFMPEG_PREFIX="/tmp/ffmpeg-out-${ABI}"
            STRIP="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

            for lib in libavcodec libavfilter libavformat libavdevice libavutil libswresample libswscale; do
              # Find the actual .so (not symlinks)
              SO=$(find $FFMPEG_PREFIX/lib -name "${lib}.so*" -not -type l | head -1)
              if [ -n "$SO" ]; then
                cp "$SO" jni/$ABI/${lib}.so
                $STRIP --strip-unneeded jni/$ABI/${lib}.so
              else
                echo "::warning::${lib}.so not found for $ABI"
              fi
            done

            # Use our compiled wrapper (built against minimal FFmpeg)
            cp /tmp/wrapper-out-${ABI}/libffmpegkit.so jni/$ABI/libffmpegkit.so

            # Copy libc++_shared.so from NDK
            NDK_LIBCXX=$(find $NDK_HOME -name "libc++_shared.so" -path "*/$ABI/*" | head -1)
            [ -n "$NDK_LIBCXX" ] && cp "$NDK_LIBCXX" jni/$ABI/

            echo "=== $ABI final contents ==="
            ls -lh jni/$ABI/
          done

          # Remove ABIs we don't build (x86 — no real devices use it)
          rm -rf jni/x86

          # Remove NEON variant duplicates from armeabi-v7a (original AAR has these)
          find jni/armeabi-v7a -name "*_neon*" -delete 2>/dev/null || true
          find jni/armeabi-v7a -name "*_armv7a_neon*" -delete 2>/dev/null || true

          # Package
          zip -r /tmp/ffmpeg-kit-minimal-gpl.aar . -x ".*"

          echo ""
          echo "=========================================="
          echo "=== SIZE COMPARISON ==="
          echo "=========================================="
          echo "Original (full-gpl): $(du -h /tmp/original.aar | cut -f1)"
          echo "Minimal:             $(du -h /tmp/ffmpeg-kit-minimal-gpl.aar | cut -f1)"
          echo ""
          echo "=== Per-ABI breakdown ==="
          for ABI in $ABIS; do
            TOTAL=$(du -ch jni/$ABI/*.so | tail -1 | cut -f1)
            echo "$ABI: $TOTAL"
          done

      - name: Validate wrapper libraries
        run: |
          cd /tmp/aar-repack
          READELF="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          OBJDUMP="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump"
          for ABI in $ABIS; do
            echo "=== $ABI wrapper NEEDED libs ==="
            $READELF -d jni/$ABI/libffmpegkit.so | grep NEEDED
            echo "=== JNI methods ==="
            $OBJDUMP -T jni/$ABI/libffmpegkit.so | grep "Java_com_antonkarpenko" | head -3
          done

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-minimal-gpl
          path: /tmp/ffmpeg-kit-minimal-gpl.aar
          retention-days: 90

      - name: Create release with AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if present
          gh release delete minimal-gpl-latest --yes 2>/dev/null || true

          gh release create minimal-gpl-latest \
            --title "Minimal GPL FFmpeg AAR" \
            --notes "Minimal FFmpeg build for AgeLapse Android. Encoders: libx264, libvpx_vp9. Filters: drawtext, overlay, scale, crop, gblur, color, format, split, colorchannelmixer. Built from FFmpeg $FFMPEG_VERSION." \
            --latest=false \
            /tmp/ffmpeg-kit-minimal-gpl.aar
